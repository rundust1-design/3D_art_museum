function buildHallNames(count) {
  const pattern = [
    {name: "Entrance",    n: 1},
    {name: "East Gallery", n: 8},
    {name: "West Gallery", n: 8},
    {name: "Central Hall", n: 4},
    {name: "Rear Sanctum", n: 5},
  ];
  const halls = [];
  for (const p of pattern) {
    for (let j = 0; j < p.n && halls.length < count; j++) halls.push(p.name);
  }
  while (halls.length < count) halls.push("Gallery");
  return halls;
}

function buildPositions(count) {
  const pos = [];
  for (let j = 0; j < 4 && pos.length < count; j++) pos.push([(j - 1.5) * 3.2, -18]);
  for (let j = 0; j < 8 && pos.length < count; j++) pos.push([7.5, -8.5 + j * 2.5]);
  for (let j = 0; j < 8 && pos.length < count; j++) pos.push([-7.5, -8.5 + j * 2.5]);
  const central = [[-2, 13], [2, 13], [-2, 16], [2, 16]];
  for (let j = 0; j < central.length && pos.length < count; j++) pos.push(central[j]);
  const rear = [[-2, 22], [2, 22]];
  for (let j = 0; j < rear.length && pos.length < count; j++) pos.push(rear[j]);
  return pos;
}

// Wall surfaces for painting placement — one per solid wall face

// Default painting positions (used when no saved layout exists)
// Each wall holds up to 6 paintings; fill higher-priority walls first, then move to next.
function buildDefaultPaintingLayout(count) {
  const layout = [];
  const yBase = 2.2;
  const spacing = 2.4;
  const MAX_PER_WALL = 6;

  let remaining = count;

  for (const w of ALL_WALLS) {
    if (remaining <= 0) break;
    const maxFit = Math.floor(w.range / spacing);
    const onThisWall = Math.min(MAX_PER_WALL, remaining, maxFit);
    const totalWidth = (onThisWall - 1) * spacing;

    for (let j = 0; j < onThisWall; j++) {
      if (w.xStart !== undefined) {
        const center = (w.xStart + w.xEnd) / 2;
        const pos = center - totalWidth / 2 + j * spacing;
        if (pos > w.xEnd) break;
        layout.push({x:pos, y:yBase, z:w.z, rotY:w.rotY, scale: 1, cs:w.cs, faceRotY:w.faceRotY});
        remaining--;
      } else {
        const center = (w.zStart + w.zEnd) / 2;
        const pos = center - totalWidth / 2 + j * spacing;
        if (pos > w.zEnd) break;
        layout.push({x:w.x, y:yBase, z:pos, rotY:w.rotY, scale: 1, cs:w.cs, faceRotY:w.faceRotY});
        remaining--;
      }
    }
  }

  return layout;
}

function getLabelScale(rotY, faceRotY) {
  // If faceRotY is explicitly defined and differs from rotY by ≈PI,
  // the frame faces the opposite direction from the canvas/label →
  // the label canvas texture needs to be flipped horizontally
  // so text reads correctly from the viewer's perspective.
  //
  // Key insight: when rotY === faceRotY, frame and canvas face the same way,
  // so the PlaneGeometry label (which sits in front of the canvas) shows text correctly.
  // When rotY !== faceRotY (difference ≈PI), the frame faces the wall surface
  // (away from the viewer), while the canvas/label face the viewer.
  // The label PlaneGeometry is rotated to face the viewer, but its texture
  // (text drawn left-to-right on a 2D canvas) appears mirrored because the
  // plane's local X-axis points opposite to the viewer's left-right direction.
  //
  // Solution: flip scale.x when frame and canvas face opposite directions.
  const fRY = faceRotY !== undefined ? faceRotY : rotY;
  const diff = Math.abs(rotY - fRY);
  const ndiff = diff % (Math.PI * 2);
  // When frame faces viewer (same direction as canvas) → normal text
  // When frame faces away from viewer (opposite to canvas) → flip text
  // Flip when diff ≈ PI (i.e., opposite directions)
  const needsFlip = (ndiff > Math.PI / 2 && ndiff < Math.PI * 3 / 2);
  return needsFlip ? -1 : 1;
}

      st.textContent = "✗ Save failed";

      setTimeout(() => { st.style.display = "none"; }, 3000);
    }
    return result.ok;
  } catch (e) {
    console.error("Save layout failed", e);
    return false;
  }
}

    return;

  try {
    // Fetch name map
    const resp = await fetch("api/name-map");
    const nameMap = await resp.json();
    // Fetch painting list
    const pResp = await fetch("api/paintings");
    const pData = await pResp.json();
    const paintings = pData.paintings || pData;
    if (!paintings || paintings.length === 0) {
      alert("没有找到图片文件！");
      return;
    }
    // Build default layout from scratch
    PAINTING_LAYOUT = buildDefaultPaintingLayout(paintings.length);
    for (let i = 0; i < PAINTING_LAYOUT.length; i++) {
      PAINTING_LAYOUT[i].fileName = paintings[i];

    buildWallButtons();

    await savePaintingLayout();

  } catch (e) {
    console.error("Init layout failed", e);
    alert("初始化失败：" + e.message);
  }
}

function computePaintingSize(fileName, scaleMult=1) {
  const REF_H = 1.0;
  const sz = PAINTING_SIZES[fileName];
  let pw = REF_H, ph = REF_H;
  if (sz && sz[0] > 0 && sz[1] > 0) {
    const ratio = sz[0] / sz[1];
    if (ratio >= 1) { pw = REF_H * ratio; ph = REF_H; }
    else { pw = REF_H; ph = REF_H / ratio; }
  }
  pw *= scaleMult; ph *= scaleMult;
  return {pw, ph};
}

function createPaintingObjects(fileName, pos) {
  const {pw, ph} = computePaintingSize(pos.fileName, pos.scale);
  const dispName = NAME_MAP[pos.fileName] || pos.fileName.replace(".jpg","");
  const px=pos.x, py=pos.y, pz=pos.z, rotY=pos.rotY;
  const frameW = 0.08;
  const faceRotY = pos.faceRotY !== undefined ? pos.faceRotY : rotY + Math.PI;

  // FRAME — now also uses cs offset (moves with canvas/label)
  // Offset direction: use rotY (wall surface direction) — same as canvas/label
  function csDir(val) {
    const r = rotY;
    if (r === 0 || r === Math.PI) return {dx:0, dz:val};
    else return {dx:val, dz:0};
  }
  const csOff = (pos.cs||0) * CS_SCALE;
  const fd = csDir(csOff);
  const frame = new THREE.Mesh(
    new THREE.BoxGeometry(pw + frameW*2, ph + frameW*2, 0.05),
    new THREE.MeshStandardMaterial({color:0x4a3728,roughness:0.6,metalness:0.1})
  );
  frame.position.set(px+fd.dx, py, pz+fd.dz);
  frame.rotation.y = rotY;

  // CANVAS (slightly in front of frame toward viewer direction)
  const canMat = new THREE.MeshBasicMaterial({color:0xffffff, side:THREE.DoubleSide});
  const canvas = new THREE.Mesh(new THREE.BoxGeometry(pw, ph, 0.008), canMat);
  // Extra 0.03 offset toward the viewer (faceRotY direction) so canvas floats in front of frame
  let cx2=px, cz2=pz;
  if (faceRotY === 0) { cz2 = pz + (pos.cs||0)*CS_SCALE + 0.03; }
  else if (faceRotY === Math.PI) { cz2 = pz + (pos.cs||0)*CS_SCALE - 0.03; }
  else if (faceRotY === Math.PI/2) { cx2 = px + (pos.cs||0)*CS_SCALE + 0.03; }
  else if (faceRotY === -Math.PI/2) { cx2 = px + (pos.cs||0)*CS_SCALE - 0.03; }
  canvas.position.set(cx2, py, cz2);
  canvas.rotation.y = faceRotY;

  const textureLoader = new THREE.TextureLoader();
  textureLoader.load("assets/images/"+fileName, (tex)=>{
    canMat.map = tex;
    canMat.needsUpdate = true;
  }, undefined, (err)=>{console.error("Texture fail:", fileName, err);});

  // LABEL
  const lh = 0.18, lw = Math.min(pw * 1.15, 1.8);
  const lc = document.createElement("canvas");
  lc.width = 1024; lc.height = 60;
  const lx = lc.getContext("2d");
  lx.clearRect(0,0,1024,60);
  lx.fillStyle = "rgba(0,0,0,0.5)";
  lx.fillRect(0,0,1024,60);
  lx.textAlign = "center"; lx.textBaseline = "middle";
  lx.fillStyle = "#ffffff";
  let fs = 26;
  lx.font = "bold "+fs+"px 'Microsoft YaHei',sans-serif";
  let tw = lx.measureText(dispName).width;
  while(tw > 1000 && fs > 12){ fs-=2; lx.font="bold "+fs+"px 'Microsoft YaHei',sans-serif"; tw=lx.measureText(dispName).width; }
  lx.fillText(dispName, 512, 32);

  const label = new THREE.Mesh(
    new THREE.PlaneGeometry(lw, lh),
    new THREE.MeshBasicMaterial({
      map: new THREE.CanvasTexture(lc), transparent: true,
      depthWrite: false, side: THREE.DoubleSide,
    })
  );
  const ld = csDir(csOff);
  label.position.set(px+ld.dx, py - ph/2 - 0.12, pz+ld.dz);
  label.rotation.y = faceRotY;
  label.scale.x = getLabelScale(rotY, faceRotY);

  return {frame, canvas, label, canMat, pw, ph};
}

function updateMinimap(){
  const cv=document.getElementById("mm");
  const displayW=190, displayH=220;
  const rs=3;
  cv.width=displayW*rs; cv.height=displayH*rs;
  const ctx=cv.getContext("2d");
  const w=cv.width, h=cv.height;
  ctx.clearRect(0,0,w,h);ctx.fillStyle="rgba(0,0,0,0.6)";ctx.fillRect(0,0,w,h);

  // Museum true dimensions:
  //   x: -11 ~ 11  (22 wide)
  //   z: -21 ~ 23  (44 deep)
  //   Inner walls: x=±5.2 (along Z from -15 to 5), z=17.5 (along X from -5.2 to 5.2)
  //   Columns: (-4,-10),(4,-10),(-4,2),(4,2),(-4,14),(4,14)
  //   Pedestals: positions from POS array
  const mapW = 22, mapD = 44;
  const pad = 16*rs;
  const availW = w - pad*2, availH = h - pad*2;
  const scale = Math.min(availW/mapW, availH/mapD);
  const ox = (w - mapW*scale)/2, oy = (h - mapD*scale)/2;
  // 3D coordinate mapping:
  //   X: -11(left) → +11(right)  maps to canvas X (left→right)
  //   Z: -21(back) → +23(front)  maps to canvas Y (top→bottom)
  function mx(x){return ox + (x + 11)*scale;}
  function mz(z){return oy + (z + 21)*scale;}
  // For readability: draw walls as thick lines on a dark background
  ctx.fillStyle="rgba(30,25,20,0.5)";ctx.fillRect(ox,oy,mapW*scale,mapD*scale);

  // Wall stroke style
  ctx.strokeStyle="#b0a090";
  ctx.lineWidth=2.5*rs;
  ctx.lineCap="round";

  // Draw solid walls as lines (maps to actual museum wall positions)
  const walls = [
    // Outer walls
    [[-11,-21],[11,-21]],  // back wall (z=-21)
    [[-11,23],[11,23]],    // front wall (z=23)
    [[-11,-21],[-11,23]],  // left wall (x=-11)
    [[11,-21],[11,23]],    // right wall (x=11)
    // Inner walls
    [[-5.2,-15],[-5.2,5]],   // inner left (x=-5.2)
    [[5.2,-15],[5.2,5]],     // inner right (x=5.2)
    [[-5.2,17.5],[5.2,17.5]], // partition at z=17.5
  ];
  for (const [[x1,z1],[x2,z2]] of walls) {
    ctx.beginPath();
    ctx.moveTo(mx(x1), mz(z1));
    ctx.lineTo(mx(x2), mz(z2));
    ctx.stroke();
  }

  // Draw columns as small circles
  ctx.fillStyle="#7a6a5a";
  const cols = [[-4,-10],[4,-10],[-4,2],[4,2],[-4,14],[4,14]];
  for (const [cx,cz] of cols) {
    ctx.beginPath();
    ctx.arc(mx(cx), mz(cz), 2.5*rs, 0, Math.PI*2);
    ctx.fill();
  }

  // Wall number labels — position them slightly off the wall surface on the painting side
  ctx.font="bold "+Math.round(13*rs)+"px sans-serif";
  ctx.textAlign="center"; ctx.textBaseline="middle";
  ctx.fillStyle="#ffd700";
  const labels = [
    {num:"①", x:-5.2+1.5, z:-3},    // wall 1, hall side (+X)
    {num:"②", x:5.2-1.5, z:-3},     // wall 2, hall side (-X)
    {num:"③", x:11+1.5, z:-5},      // wall 3 (outer right)
    {num:"④", x:-11-1.5, z:-5},     // wall 4 (outer left)
    {num:"⑤", x:0, z:24.5},         // wall 5 (front)
    {num:"⑥", x:0, z:-22.5},        // wall 6 (back)
    {num:"⑦", x:0, z:18.8},         // wall 7 (partition, main side)
    {num:"⑧", x:-5.2-1.5, z:-3},    // wall 8, corridor side (-X)
    {num:"⑨", x:5.2+1.5, z:-3},     // wall 9, corridor side (+X)
    {num:"⑩", x:0, z:16.2},         // wall 10 (partition, entrance side)
  ];
  for (const lb of labels) {
    ctx.fillText(lb.num, mx(lb.x), mz(lb.z));
  }

  // Draw paintings as small red dots
  if (PAINTING_OBJECTS) {
    for (const obj of PAINTING_OBJECTS) {
      const p = obj.data;
      ctx.fillStyle = "#ff4444";
      ctx.beginPath();
      ctx.arc(mx(p.x), mz(p.z), 2*rs, 0, Math.PI*2);
      ctx.fill();
    }
  }

  // Draw pedestals (3D sculptures)
  for (const p of pedestals) {
    ctx.fillStyle = p.loaded ? "#44ff44" : "#666";
    const sz = p.loaded ? 3.5*rs : 2.5*rs;
    ctx.fillRect(mx(p.pos[0])-sz/2, mz(p.pos[1])-sz/2, sz, sz);
    // Small dot inside for visibility
    if (p.loaded) {
      ctx.fillStyle = "#aaffaa";
      ctx.beginPath();
      ctx.arc(mx(p.pos[0]), mz(p.pos[1]), 1*rs, 0, Math.PI*2);
      ctx.fill();
    }
  }

  // Draw user position (camera)
  const cx=camera.position.x, cz=camera.position.z;
  ctx.beginPath();
  ctx.arc(mx(cx), mz(cz), 3.5*rs, 0, Math.PI*2);
  ctx.fillStyle="#ffff44";
  ctx.fill();
  ctx.strokeStyle="#fff";
  ctx.lineWidth=1.5*rs;
  ctx.stroke();

  // Draw user facing direction
  const dir=new THREE.Vector3(0,0,-1);
  dir.applyQuaternion(camera.quaternion);
  const lineLen = 1.8;
  ctx.beginPath();
  ctx.moveTo(mx(cx), mz(cz));
  ctx.lineTo(mx(cx+dir.x*lineLen), mz(cz+dir.z*lineLen));
  ctx.strokeStyle="#ffff44";
  ctx.lineWidth=2.5*rs;
  ctx.stroke();
}

function getPaintingIntersects(clientX, clientY) {
  const rect = renderer.domElement.getBoundingClientRect();
  pointer.x = ((clientX - rect.left) / rect.width) * 2 - 1;
  pointer.y = -((clientY - rect.top) / rect.height) * 2 + 1;
  raycaster.setFromCamera(pointer, camera);
  const meshes = [];
  for (let i = 0; i < PAINTING_OBJECTS.length; i++) {
    meshes.push(PAINTING_OBJECTS[i].frame);
    meshes.push(PAINTING_OBJECTS[i].canvas);
  }
  return raycaster.intersectObjects(meshes);
}

// ===================== GET WALL INDEX =====================
function getWallIndex(p) {
  let bestIdx = -1;
  let bestDist = Infinity;
  for (let i = 0; i < ALL_WALLS.length; i++) {
    const w = ALL_WALLS[i];
    // Find closest wall surface based ONLY on physical position
    let cx, cz;
    if (w.xStart !== undefined) {
      // Z-oriented wall: fixed z, paintings arranged along X
      cx = Math.max(w.xStart, Math.min(w.xEnd, p.x));
      cz = w.z;
    } else {
      // X-oriented wall: fixed x, paintings arranged along Z
      cx = w.x;
      cz = Math.max(w.zStart, Math.min(w.zEnd, p.z));
    }
    const dx = p.x - cx, dz = p.z - cz;
    const dist = Math.sqrt(dx * dx + dz * dz);
    if (dist < bestDist && dist < 0.6) {
      bestDist = dist;
      bestIdx = i;
    }
  }
  // If we found a position match, also verify the wall orientation matches
  if (bestIdx >= 0) {
    const w = ALL_WALLS[bestIdx];
    // Check rotY match (allow small floating point tolerance)
    if (Math.abs(w.rotY - p.rotY) > 0.05) {
      // rotY mismatch — try harder: maybe the painting was rotated after placement
      // Still allow the match if they share faceRotY or the position is very close
      if (w.faceRotY !== undefined && p.faceRotY !== undefined) {
        if (Math.abs(w.faceRotY - p.faceRotY) > 0.05) {
          // Neither rotY nor faceRotY match — reject this match
          bestIdx = -1;
        }
      } else {
        bestIdx = -1;
      }
    }
  }
  return bestIdx;
}

// ===================== MOVE TO WALL =====================
function moveToWall(obj, wallIdx) {
  const w = ALL_WALLS[wallIdx];
  if (!w) return;
  const p = obj.data;

  p.rotY = w.rotY;
  p.cs = w.cs || 0;
  p.faceRotY = w.faceRotY !== undefined ? w.faceRotY : w.rotY + Math.PI;
  if (w.xStart !== undefined) {
    p.x = (w.xStart + w.xEnd) / 2;
    p.z = w.z;
  } else {
    p.z = (w.zStart + w.zEnd) / 2;
    p.x = w.x;
  }
  p.y = 2.2;
  updateSinglePainting(selectedIdx);
  selectPainting(selectedIdx);

  // Move camera to stand in front of the painting
  // faceRotY = direction the canvas normal points (the direction the painting faces)
  // Camera stands BEHIND the painting in the OPPOSITE direction, looking toward the painting
  // So camera is at p - sin(faceRY)*dist, p - cos(faceRY)*dist
  // and looks at (p.x, p.y, p.z)
  const dist = 3.0;
  const faceRY = p.faceRotY !== undefined ? p.faceRotY : p.rotY + Math.PI;
  // Camera stands in the faceRotY direction (in front of the painting)
  // faceRotY = direction the canvas normal points = the side the viewer should stand
  // offset = +faceRotY direction = (sin(faceRY), cos(faceRY))
  let cx = p.x + Math.sin(faceRY) * dist;
  let cz = p.z + Math.cos(faceRY) * dist;
  cx = Math.max(-12, Math.min(12, cx));
  cz = Math.max(-20, Math.min(24, cz));
  camera.position.set(cx, Math.max(1.5, p.y), cz);
  // Camera looks toward the painting center, regardless of which side it's on
  camera.lookAt(p.x, p.y, p.z);
  euler.setFromQuaternion(camera.quaternion);
  updateMinimap();
}

// Snap distance threshold — how close a painting must be to a wall to auto-snap
const SNAP_DIST = 0.6;

function snapToNearestWall(p) {
  // Check distance to each wall surface, snap if close enough
  let bestWall = null;
  let bestDist = SNAP_DIST;
  for (const w of ALL_WALLS) {
    let dx, dz;
    if (w.xStart !== undefined) {
      // Wall runs along X axis at fixed z
      const wallZ = w.z;
      const clampedX = Math.max(w.xStart, Math.min(w.xEnd, p.x));
      dx = p.x - clampedX;
      dz = p.z - wallZ;
    } else {
      // Wall runs along Z axis at fixed x
      const wallX = w.x;
      const clampedZ = Math.max(w.zStart, Math.min(w.zEnd, p.z));
      dx = p.x - wallX;
      dz = p.z - clampedZ;
    }
    const dist = Math.sqrt(dx * dx + dz * dz);
    if (dist < bestDist) {
      bestDist = dist;
      bestWall = w;
    }
  }
  if (bestWall) {
    // Snap to this wall
    const newRotY = bestWall.rotY;
    const changedWall = newRotY !== p.rotY;
    p.rotY = newRotY;
    p.cs = bestWall.cs || 0;
    p.faceRotY = bestWall.faceRotY !== undefined ? bestWall.faceRotY : bestWall.rotY + Math.PI;
    if (bestWall.xStart !== undefined) {
      p.x = Math.max(bestWall.xStart, Math.min(bestWall.xEnd, p.x));
      p.z = bestWall.z;
    } else {
      p.z = Math.max(bestWall.zStart, Math.min(bestWall.zEnd, p.z));
      p.x = bestWall.x;
    }
    return changedWall;
  }
  return false;
}

function updatePaintingMeshPositions(obj) {
  const p = obj.data;
  // Clamp to museum bounds
  p.x = Math.max(-11.5, Math.min(11.5, p.x));
  p.z = Math.max(-21.5, Math.min(23.5, p.z));
  p.y = Math.max(0.8, Math.min(4.5, p.y));
  const {pw, ph} = computePaintingSize(p.fileName, p.scale);
  const faceRY = p.faceRotY !== undefined ? p.faceRotY : p.rotY + Math.PI;
  function csDir(val) {
    const r = p.rotY;
    if (r === 0 || r === Math.PI) return {dx:0, dz:val};
    else return {dx:val, dz:0};
  }
  const cs = (p.cs||0) * CS_SCALE;
  const fd = csDir(cs);
  obj.frame.position.set(p.x+fd.dx, p.y, p.z+fd.dz);
  obj.frame.rotation.y = p.rotY;
  const cd = csDir(cs);
  // Extra 0.03 in faceRotY direction so canvas floats in front of frame
  const extraDir = {dx:0, dz:0};
  if (faceRY === 0) extraDir.dz = 0.03;
  else if (faceRY === Math.PI) extraDir.dz = -0.03;
  else if (faceRY === Math.PI/2) extraDir.dx = 0.03;
  else if (faceRY === -Math.PI/2) extraDir.dx = -0.03;
  obj.canvas.rotation.y = faceRY;
  obj.canvas.position.set(p.x+cd.dx+extraDir.dx, p.y, p.z+cd.dz+extraDir.dz);
  const ld = csDir(cs);
  obj.label.rotation.y = faceRY;
  obj.label.position.set(p.x+ld.dx, p.y - ph/2 - 0.12, p.z+ld.dz);
  obj.label.scale.x = getLabelScale(p.rotY, p.faceRotY);
}

function updateSinglePainting(idx) {
  const obj = PAINTING_OBJECTS[idx];
  if (!obj) return;
  const p = obj.data;
  const {pw, ph} = computePaintingSize(p.fileName, p.scale);
  const frameW = 0.08;
  const dispName = NAME_MAP[p.fileName] || p.fileName.replace(".jpg","");

  // Dispose old geometries and materials
  obj.frame.geometry.dispose();
  obj.frame.material.dispose();
  obj.canvas.geometry.dispose();
  obj.label.geometry.dispose();
  obj.label.material.dispose();

  // Recreate frame geometry
  obj.frame.geometry = new THREE.BoxGeometry(pw + frameW*2, ph + frameW*2, 0.05);
  // Recreate canvas geometry
  const oldMat = obj.canvas.material;
  obj.canvas.geometry = new THREE.BoxGeometry(pw, ph, 0.008);
  // Recreate label
  const lh = 0.18, lw = Math.min(pw * 1.15, 1.8);
  const lc = document.createElement("canvas");
  lc.width = 1024; lc.height = 60;
  const lx = lc.getContext("2d");
  lx.clearRect(0,0,1024,60);
  lx.fillStyle = "rgba(0,0,0,0.5)";
  lx.fillRect(0,0,1024,60);
  lx.textAlign = "center"; lx.textBaseline = "middle";
  lx.fillStyle = "#ffffff";
  let fs = 26;
  lx.font = "bold "+fs+"px 'Microsoft YaHei',sans-serif";
  let tw = lx.measureText(dispName).width;
  while(tw > 1000 && fs > 12){ fs-=2; lx.font="bold "+fs+"px 'Microsoft YaHei',sans-serif"; tw=lx.measureText(dispName).width; }
  lx.fillText(dispName, 512, 32);
  obj.label.geometry = new THREE.PlaneGeometry(lw, lh);
  obj.label.material = new THREE.MeshBasicMaterial({
    map: new THREE.CanvasTexture(lc), transparent: true,
    depthWrite: false, side: THREE.DoubleSide,
  });
  obj.label.scale.x = getLabelScale(p.rotY, p.faceRotY);

  // Reposition everything — use faceRotY for cs offset direction
  const faceRY = p.faceRotY !== undefined ? p.faceRotY : p.rotY + Math.PI;
  function csDir(val) {
    const r = p.rotY;
    if (r === 0 || r === Math.PI) return {dx:0, dz:val};
    else return {dx:val, dz:0};
  }
  const cs = (p.cs||0) * CS_SCALE;
  const fd = csDir(cs);
  obj.frame.position.set(p.x+fd.dx, p.y, p.z+fd.dz);
  obj.frame.rotation.y = p.rotY;
  const cd = csDir(cs);
  // Extra 0.03 in faceRotY direction so canvas floats in front of frame
  const extraDir = {dx:0, dz:0};
  if (faceRY === 0) extraDir.dz = 0.03;
  else if (faceRY === Math.PI) extraDir.dz = -0.03;
  else if (faceRY === Math.PI/2) extraDir.dx = 0.03;
  else if (faceRY === -Math.PI/2) extraDir.dx = -0.03;
  obj.canvas.rotation.y = faceRY;
  obj.canvas.position.set(p.x+cd.dx+extraDir.dx, p.y, p.z+cd.dz+extraDir.dz);
  const ld = csDir(cs);
  obj.label.rotation.y = faceRY;
  obj.label.position.set(p.x+ld.dx, p.y - ph/2 - 0.12, p.z+ld.dz);
  obj.pw = pw; obj.ph = ph;
}

// Edit mode state
let EDIT_MODE = false;

// CS direction arrow indicator — a small 3D arrow mesh shown on selected painting
let csArrowGroup = null;

function createCSArrow() {
  if (csArrowGroup) {
    scene.remove(csArrowGroup);
    csArrowGroup = null;
  }
  csArrowGroup = new THREE.Group();

  // Arrow body (cone + cylinder)
  const arrowLen = 0.25;
  const arrowMat = new THREE.MeshBasicMaterial({ color: 0xff4444 });

  // Arrow shaft
  const shaft = new THREE.Mesh(
    new THREE.CylinderGeometry(0.008, 0.008, arrowLen * 0.6, 8),
    arrowMat
  );
  shaft.rotation.z = -Math.PI / 2;
  shaft.position.x = arrowLen * CS_SCALE;
  csArrowGroup.add(shaft);

  // Arrow head (cone)
  const head = new THREE.Mesh(
    new THREE.ConeGeometry(0.03, arrowLen * 0.4, 8),
    arrowMat
  );
  head.rotation.z = -Math.PI / 2;
  head.position.x = arrowLen * 0.8;
  csArrowGroup.add(head);

  // Glow ring
  const glowMat = new THREE.SpriteMaterial({
    map: (() => {
      const c = document.createElement("canvas");
      c.width = 64; c.height = 64;
      const ctx = c.getContext("2d");
      const grad = ctx.createRadialGradient(32, 32, 0, 32, 32, 32);
      grad.addColorStop(0, "rgba(255,68,68,0.4)");
      grad.addColorStop(1, "rgba(255,68,68,0)");
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, 64, 64);
      return new THREE.CanvasTexture(c);
    })(),
    transparent: true,
    depthWrite: false,
    blending: THREE.AdditiveBlending
  });
  const glow = new THREE.Sprite(glowMat);
  glow.position.x = arrowLen * 0.8;
  glow.scale.set(0.3, 0.3, 1);
  csArrowGroup.add(glow);

  scene.add(csArrowGroup);
}

function updateCSArrow(obj) {
  if (!csArrowGroup) createCSArrow();
  if (!csArrowGroup) return;
  const p = obj.data;
  const pw = obj.pw || 1.0;
  const ph = obj.ph || 1.0;

  // Arrow shows the direction the painting faces (faceRotY direction)
  const faceRY = p.faceRotY !== undefined ? p.faceRotY : p.rotY + Math.PI;
  const arrowOffsetX = pw / 2 + 0.25;
  let ax, ay, az, aRot;

  // Arrow placement perpendicular to face direction, arrow points along face direction
  if (faceRY === 0) {
    // Facing +Z: arrow to the right (+X), pointing +Z
    ax = p.x + arrowOffsetX; ay = p.y + ph/2 + 0.1; az = p.z;
    aRot = 0;
  } else if (faceRY === Math.PI) {
    // Facing -Z: arrow to the right (-X), pointing -Z
    ax = p.x - arrowOffsetX; ay = p.y + ph/2 + 0.1; az = p.z;
    aRot = Math.PI;
  } else if (faceRY === Math.PI/2) {
    // Facing +X: arrow above (+Z), pointing +X
    ax = p.x; ay = p.y + ph/2 + 0.1; az = p.z + arrowOffsetX;
    aRot = Math.PI/2;
  } else {
    // Facing -X: arrow above (-Z), pointing -X
    ax = p.x; ay = p.y + ph/2 + 0.1; az = p.z - arrowOffsetX;
    aRot = -Math.PI/2;
  }

  csArrowGroup.position.set(ax, ay, az);
  csArrowGroup.rotation.y = aRot;
  csArrowGroup.visible = true;
}

function hideCSArrow() {
  if (csArrowGroup) csArrowGroup.visible = false;
}

function toggleEditMode() {
  EDIT_MODE = !EDIT_MODE;
  if (EDIT_MODE) {
    // Enter edit mode: show panel, wall labels
    const panel = document.getElementById("edit-panel");
    panel.style.display = "block";
    showWallLabels();
    // Lock pointer while in edit mode for clicking paintings
    renderer.domElement.requestPointerLock();
    selectPainting(-1);
    // Hide movement UI
    document.getElementById("ui").style.opacity = "0";
    setTimeout(() => {
      document.getElementById("ui").style.display = "none";
    }, 500);
    const badge = document.getElementById("edit-mode-badge");
    if (badge) badge.style.display = "block";
  } else {
    // Exit edit mode: hide panel, wall labels, cs arrow
    const panel = document.getElementById("edit-panel");
    panel.style.display = "none";
    hideWallLabels();
    hideCSArrow();
    selectPainting(-1);
    // Show movement UI
    document.getElementById("ui").style.display = "block";
    document.getElementById("ui").style.opacity = "1";
    const badge = document.getElementById("edit-mode-badge");
    if (badge) badge.style.display = "none";
    // Exit pointer lock
    if (document.pointerLockElement === renderer.domElement) {
      document.exitPointerLock();
    }
    // Reset camera to prevent drift
    euler.setFromQuaternion(camera.quaternion);
  }
}

function movePainting(e, obj, p, mv) {
  e.preventDefault();
  let curWall;
  switch (e.code) {
    case "KeyA": // move left along wall surface (Z for X-walls, X for Z-walls)
      if (p.rotY === 0 || p.rotY === Math.PI) {
        p.x -= Math.cos(p.rotY) * mv;
      } else {
        p.z += Math.sin(p.rotY) * mv;
      }
      break;
    case "KeyD": // move right along wall surface
      if (p.rotY === 0 || p.rotY === Math.PI) {
        p.x += Math.cos(p.rotY) * mv;
      } else {
        p.z -= Math.sin(p.rotY) * mv;
      }
      break;
    case "KeyW": // move up (Y+)
      p.y += mv;
      break;
    case "KeyS": // move down (Y-)
      p.y -= mv;
      break;
    case "KeyE": // flip cs direction (painting facing toward/away from hallway)
      p.cs = -(p.cs || 0);
      // Also flip faceRotY when cs flips (canvas should face the opposite way)
      // faceRotY is the direction the canvas plane normal points.
      // When cs flips, the canvas needs to face the opposite direction from the wall
      // so it still faces the viewer (who is now on the other side).
      if (p.faceRotY !== undefined) {
        // Flip faceRotY by adding/subtracting PI
        p.faceRotY = (p.faceRotY + Math.PI) % (Math.PI * 2);
      }
      break;
    case "KeyQ": // move to next wall
      curWall = getWallIndex(p);
      if (curWall >= 0) {
        const nextWall = (curWall + 1) % ALL_WALLS.length;
        moveToWall(obj, nextWall);
        return; // moveToWall already calls updateSinglePainting + selectPainting
      }
      break;
  }
  updateSinglePainting(selectedIdx);
  selectPainting(selectedIdx);
  updateMinimap();
  // Update the cs arrow after position change
  if (selectedIdx >= 0) {
    updateCSArrow(PAINTING_OBJECTS[selectedIdx]);
  }
}

  document.getElementById("popup").style.display="block";
}
function exitOrbit(){orbiting=false;selModel=null;document.getElementById("popup").style.display="none";}
function updateOrbit(dt){
  if(!orbiting||selModel===null)return;
  const p=pedestals[selModel],cx=p.pos[0],cz=p.pos[1];
  const tx=cx+Math.cos(oAngle)*oRad,tz=cz+Math.sin(oAngle)*oRad,ty=p.group.position.y+0.98+oY;
  camera.position.lerp(new THREE.Vector3(tx,ty,tz),5*dt);camera.lookAt(cx,p.group.position.y+0.98,cz);
}
function updateFP(dt){
  if(orbiting||!pointerLocked)return;const spd=8*dt;vel.set(0,0,0);
  if(mvF)vel.z-=spd;if(mvB)vel.z+=spd;if(mvL)vel.x-=spd;if(mvR)vel.x+=spd;
  if(vel.length()>0){vel.normalize().multiplyScalar(spd);
    const fwd=new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion);fwd.y=0;fwd.normalize();
    const rgt=new THREE.Vector3(1,0,0).applyQuaternion(camera.quaternion);rgt.y=0;rgt.normalize();
    camera.position.addScaledVector(fwd,-vel.z);camera.position.addScaledVector(rgt,vel.x);
    const now=performance.now();if(now-lastStep>400){snd(60,0.06,0.02);lastStep=now;}}
  camera.position.x=Math.max(-10,Math.min(10,camera.position.x));
  camera.position.z=Math.max(-20,Math.min(22,camera.position.z));
}
function animate(){
  requestAnimationFrame(animate);const dt=Math.min(clk.getDelta(),0.1);
  if(pointerLocked && !EDIT_MODE){updateFP(dt);updateInfo();updateMinimap();}
  updateOrbit(dt);
  const t=performance.now()*0.001;
  pedestals.forEach(p=>{if(!p.loaded){p.ring.material.emissiveIntensity=0.4+Math.sin(t*2+p.index)*0.3;}});
  renderer.render(scene,camera);
}
async function startMuseum() {
  await Promise.all([fetchModelList(), fetchPaintingList(), fetchNameMap(), fetchPaintingSizes(), fetchPaintingLayout()]);
  buildMuseum();
  setupLights();

  if (MODELS.length > 0) {
    loadAllModels();
  }
  loadAllPaintings();

  document.getElementById("subtitle").textContent = (MODELS.length ? MODELS.length+" 3D Exhibits | " : "") + PAINTINGS.length + " Paintings";
  document.getElementById("hint").textContent="Walk around to explore!";
  console.log("Museum ready -",pedestals.length,"exhibits,",PAINTINGS.length,"paintings");
}

startMuseum();
animate();
</script>
