  {z:-20.8, rotY:r0, xStart:-10.5, xEnd:10.5, range:21, cs:1, faceRotY:r0},  // ⑥
  {z:17.35, rotY:rP, xStart:-4.5, xEnd:4.5, range:9, cs:-1, faceRotY:rP},    // ⑦
  {x:-4.95, rotY:rNH, zStart:-14, zEnd:5, range:19, cs:-1.5, faceRotY:rNH},  // ⑧
  {x:4.95, rotY:rH, zStart:-14, zEnd:5, range:19, cs:1.45, faceRotY:rH},     // ⑨
  {z:17.65, rotY:r0, xStart:-4.5, xEnd:4.5, range:9, cs:1, faceRotY:r0},     // ⑩
];

// Model placement — priority order per user rules
// 1. 6号墙前 (后墙 z=-20.8, 大厅侧) — 4个, 距墙2个模型距离
// 2. 10号墙前 (z=17.65, 入口侧) — 4个, 距墙2个模型距离
// 3. 4号墙(x=-10.8)和8号墙(x=-4.95)之间 — 6个, 居中排列
// 4. 3号墙(x=10.8)和9号墙(x=4.95)之间 — 6个, 居中排列
// 5. 1号墙(x=-5.05)和2号墙(x=5.05)之间 — 8个, 居中排列
function buildModelPositions(count) {
  const pos = [];
  const half = 0.55; // half pedestal width
  const gap = 2 * half; // "2个模型距离" = 1.1
  // 1: 6号墙前 (z=-20.8 大厅侧) — 4个
  const zA = -20.8 + gap;  // = -19.7
  const xA = [-7.5, -2.5, 2.5, 7.5];
  for (const x of xA) { if (pos.length < count) pos.push([x, zA]); }
  // 2: 10号墙前 (z=17.65 主厅侧, 对着主厅方向z↓) — 4个, 放在z<17.35侧不在5-7之间
  const zB = 16.2;
  const xB = [-3.5, -1.17, 1.17, 3.5];
  for (const x of xB) { if (pos.length < count) pos.push([x, zB]); }
  // 3: 4号墙(x=-10.8)和8号墙(x=-4.95)之间 — 左走廊, 居中于x ≈ -7.875
  for (let j = 0; j < 6 && pos.length < count; j++) pos.push([-7.875, -14 + j * 3.8]);
  // 4: 3号墙(x=10.8)和9号墙(x=4.95)之间 — 右走廊, 居中于x ≈ 7.875
  for (let j = 0; j < 6 && pos.length < count; j++) pos.push([7.875, -14 + j * 3.8]);
  // 5: 1号墙(x=-5.05)和2号墙(x=5.05)之间 — 主厅, 居中于x = 0
  for (let j = 0; j < 8 && pos.length < count; j++) pos.push([0, -12 + j * 3.2]);
  return pos;
}

function buildDefaultModelLayout(count) {
  const layout = [];
  const positions = buildModelPositions(count);
  for (let i = 0; i < positions.length; i++) {
    layout.push({x: positions[i][0], z: positions[i][1], rotY: 0, scale: 1.2});
  }
  return layout;
}

// ===================== PAINTING LAYOUT =====================
function buildDefaultPaintingLayout(count) {
  const layout = [];
  const yBase = 2.2;
  const spacing = 2.4;
  const MAX_PER_WALL = 6;
  let remaining = count;
  for (const w of ALL_WALLS) {
    if (remaining <= 0) break;
    const maxFit = Math.floor(w.range / spacing);
    const onThisWall = Math.min(MAX_PER_WALL, remaining, maxFit);
    const totalWidth = (onThisWall - 1) * spacing;
    for (let j = 0; j < onThisWall; j++) {
      if (w.xStart !== undefined) {
        const center = (w.xStart + w.xEnd) / 2;
        const pos = center - totalWidth / 2 + j * spacing;
        if (pos > w.xEnd) break;
        layout.push({x:pos, y:yBase, z:w.z, rotY:w.rotY, scale: 1, cs:w.cs, faceRotY:w.faceRotY});
        remaining--;
      } else {
        const center = (w.zStart + w.zEnd) / 2;
        const pos = center - totalWidth / 2 + j * spacing;
        if (pos > w.zEnd) break;
        layout.push({x:w.x, y:yBase, z:pos, rotY:w.rotY, scale: 1, cs:w.cs, faceRotY:w.faceRotY});
        remaining--;
      }
    }
  }
  return layout;
}

function getLabelScale(rotY, faceRotY) {
  const fRY = faceRotY !== undefined ? faceRotY : rotY;
  const diff = Math.abs(rotY - fRY);
  const ndiff = diff % (Math.PI * 2);
  const needsFlip = (ndiff > Math.PI / 2 && ndiff < Math.PI * 3 / 2);
  return needsFlip ? -1 : 1;
}

// ===================== GLOBALS =====================
let MODELS = [];
let PAINTINGS = [];

let MODEL_NAME_MAP = {};

// ===================== COLLISION DATA =====================
const COLLISION_WALLS = [

  { minX: -11.2, maxX: -10.8, minZ: -19.25, maxZ: 5.25 }, // left outer
  { minX: 10.8, maxX: 11.2, minZ: -19.25, maxZ: 5.25 },   // right outer
  { minX: -11, maxX: 11, minZ: 22.8, maxZ: 23.2 },        // front wall
  { minX: -5.35, maxX: -5.05, minZ: -15.25, maxZ: 6.25 }, // left inner (wood)
  { minX: 5.05, maxX: 5.35, minZ: -15.25, maxZ: 6.25 },   // right inner (wood)
  { minX: -5.25, maxX: 5.25, minZ: 17.35, maxZ: 17.65 },  // dividing wall (wood)
];
const COLLISION_COLUMNS = [
  { x: -4, z: -10, radius: 0.35 }, { x: 4, z: -10, radius: 0.35 },
  { x: -4, z: 2, radius: 0.35 },   { x: 4, z: 2, radius: 0.35 },
  { x: -4, z: 14, radius: 0.35 },  { x: 4, z: 14, radius: 0.35 },
];
const MODEL_COL_RADIUS = 0.7;   // pedestal base half-diagonal ≈ 0.78
const CAMERA_COL_RADIUS = 0.3;  // human shoulder width

function pushCircleOutOfAABB(cx, cz, radius, aabb) {
  const clampX = Math.max(aabb.minX, Math.min(cx, aabb.maxX));
  const clampZ = Math.max(aabb.minZ, Math.min(cz, aabb.maxZ));
  const dx = cx - clampX;
  const dz = cz - clampZ;
  const distSq = dx * dx + dz * dz;
  if (distSq < radius * radius) {
    const dist = Math.sqrt(distSq);
    if (dist < 0.0001) {
      const overlapX = Math.min(cx - aabb.minX, aabb.maxX - cx);
      const overlapZ = Math.min(cz - aabb.minZ, aabb.maxZ - cz);
      if (overlapX < overlapZ) {
        const sign = (cx - aabb.minX < aabb.maxX - cx) ? -1 : 1;
        return { x: cx + sign * (overlapX + radius), z: cz };
      } else {
        const sign = (cz - aabb.minZ < aabb.maxZ - cz) ? -1 : 1;
        return { x: cx, z: cz + sign * (overlapZ + radius) };
      }
    }
    const nx = dx / dist;
    const nz = dz / dist;
    return { x: clampX + nx * radius, z: clampZ + nz * radius };
  }
  return { x: cx, z: cz };
}

function pushCircleOutOfCircle(ax, az, aR, bx, bz, bR) {
  const dx = ax - bx;
  const dz = az - bz;
  const distSq = dx * dx + dz * dz;
  const minDist = aR + bR;
  if (distSq < minDist * minDist) {
    const dist = Math.sqrt(distSq);
    if (dist < 0.0001) return { x: ax + minDist, z: az };
    const overlap = minDist - dist;
    const nx = dx / dist;
    const nz = dz / dist;
    return { x: ax + nx * overlap, z: az + nz * overlap };
  }
  return { x: ax, z: az };
}

function getCollisionBoxes(excludeModelIdx) {
  const models = [];
  for (let i = 0; i < MODEL_OBJECTS.length; i++) {
    if (i === excludeModelIdx) continue;
    const obj = MODEL_OBJECTS[i];
    if (!obj || !obj.loaded) continue;
    const p = obj.data;
    models.push({ type: 'circle', x: p.x, z: p.z, radius: MODEL_COL_RADIUS });
  }
  return { walls: COLLISION_WALLS, columns: COLLISION_COLUMNS, models };
}

function clampMovement(x, z, radius, excludeModelIdx) {
  const { walls, columns, models } = getCollisionBoxes(excludeModelIdx);
  let rx = x, rz = z;
  const MAX_ITER = 8;
  for (let iter = 0; iter < MAX_ITER; iter++) {
    let pushed = false;
    for (const w of walls) {
      const res = pushCircleOutOfAABB(rx, rz, radius, w);
      if (res.x !== rx || res.z !== rz) { rx = res.x; rz = res.z; pushed = true; }
    }
    for (const c of columns) {
      const res = pushCircleOutOfCircle(rx, rz, radius, c.x, c.z, c.radius);
      if (res.x !== rx || res.z !== rz) { rx = res.x; rz = res.z; pushed = true; }
    }
    for (const m of models) {
      const res = pushCircleOutOfCircle(rx, rz, radius, m.x, m.z, m.radius);
      if (res.x !== rx || res.z !== rz) { rx = res.x; rz = res.z; pushed = true; }
    }
    if (!pushed) break;
  }
  return { x: rx, z: rz };
}

function buildMuseum(){

      const model=gltf.scene;
      const box=new THREE.Box3().setFromObject(model);
      const size=box.getSize(new THREE.Vector3());
      const maxDim=Math.max(size.x,size.y,size.z);
      const scale = layout.scale / maxDim;
      model.scale.setScalar(scale);
      const center=box.getCenter(new THREE.Vector3());
      model.position.set(-center.x*scale, -box.min.y*scale, -center.z*scale);

      const pCol=new THREE.Mesh(new THREE.CylinderGeometry(0.28,0.32,0.85,12),pMat2);pCol.position.y=0.5;group.add(pCol);
      const pTop=new THREE.Mesh(new THREE.BoxGeometry(1.05,0.05,1.05),pMat);pTop.position.y=0.94;group.add(pTop);
      // Name plate: 放在平台上方, 高度为之前一半, 在模型正向(-Z)侧

      pctx.fillText(dispName, 128, 26);

      const plate=new THREE.Mesh(
        new THREE.BoxGeometry(0.8,0.225,0.05),
        new THREE.MeshStandardMaterial({map: plateTex, roughness:0.4,metalness:0.3})
      );
      plate.position.set(0, 1.0525, -0.5);
      group.add(plate);

      group.add(model);
      scene.add(group);

      // Selection ring (initially hidden)
      const ringGeo = new THREE.TorusGeometry(0.6, 0.03, 8, 24);

function selectModel(idx) {

function getModelIntersects(clientX, clientY) {
  const rect = renderer.domElement.getBoundingClientRect();
  pointer.x = ((clientX - rect.left) / rect.width) * 2 - 1;
  pointer.y = -((clientY - rect.top) / rect.height) * 2 + 1;
  raycaster.setFromCamera(pointer, camera);
  const meshes = [];
  for (let i = 0; i < MODEL_OBJECTS.length; i++) {
    if (MODEL_OBJECTS[i]) {
      MODEL_OBJECTS[i].group.traverse((child) => {
        if (child.isMesh) meshes.push(child);
      });
    }
  }
  return raycaster.intersectObjects(meshes, false);
}

function moveModel(e, obj, p, mv) {
  e.preventDefault();
  switch (e.code) {
    case "KeyA": p.x -= mv; break;
    case "KeyD": p.x += mv; break;
    case "KeyW": if (e.shiftKey) { p.y = (p.y||0) + mv; } else { p.z -= mv; } break;
    case "KeyS": if (e.shiftKey) { p.y = (p.y||0) - mv; } else { p.z += mv; } break;
    case "KeyR": p.rotY -= 0.087; break; // ~5° CCW
    case "KeyF": p.rotY += 0.087; break; // ~5° CW
  }
  const clampedMv = clampMovement(p.x, p.z, MODEL_COL_RADIUS, SELECTED_MODEL_IDX);
  p.x = Math.max(-11.5, Math.min(11.5, clampedMv.x));
  p.z = Math.max(-21.5, Math.min(23.5, clampedMv.z));
  p.y = Math.max(-0.5, Math.min(4.5, p.y || 0));
  updateModelPosition(SELECTED_MODEL_IDX);
  selectModel(SELECTED_MODEL_IDX);
  updateMinimap();
}

function computePaintingSize(fileName, scaleMult=1) {
  const REF_H = 1.0;
  const sz = PAINTING_SIZES[fileName];
  let pw = REF_H, ph = REF_H;
  if (sz && sz[0] > 0 && sz[1] > 0) {
    const ratio = sz[0] / sz[1];
    if (ratio >= 1) { pw = REF_H * ratio; ph = REF_H; }
    else { pw = REF_H; ph = REF_H / ratio; }
  }
  pw *= scaleMult; ph *= scaleMult;
  return {pw, ph};
}

function createPaintingObjects(fileName, pos) {
  const {pw, ph} = computePaintingSize(pos.fileName, pos.scale);
  const dispName = NAME_MAP[pos.fileName] || pos.fileName.replace(".jpg","");
  const px=pos.x, py=pos.y, pz=pos.z, rotY=pos.rotY;
  const frameW = 0.08;
  const faceRotY = pos.faceRotY !== undefined ? pos.faceRotY : rotY + Math.PI;
  function csDir(val) {
    const r = rotY;
    if (r === 0 || r === Math.PI) return {dx:0, dz:val};
    else return {dx:val, dz:0};
  }
  const csOff = (pos.cs||0) * CS_SCALE;
  const fd = csDir(csOff);
  const frame = new THREE.Mesh(
    new THREE.BoxGeometry(pw + frameW*2, ph + frameW*2, 0.05),
    new THREE.MeshStandardMaterial({color:0x4a3728,roughness:0.6,metalness:0.1})
  );
  frame.position.set(px+fd.dx, py, pz+fd.dz);
  frame.rotation.y = rotY;
  const canMat = new THREE.MeshBasicMaterial({color:0xffffff, side:THREE.DoubleSide});
  const canvas = new THREE.Mesh(new THREE.BoxGeometry(pw, ph, 0.008), canMat);
  let cx2=px, cz2=pz;
  if (faceRotY === 0) { cz2 = pz + (pos.cs||0)*CS_SCALE + 0.03; }
  else if (faceRotY === Math.PI) { cz2 = pz + (pos.cs||0)*CS_SCALE - 0.03; }
  else if (faceRotY === Math.PI/2) { cx2 = px + (pos.cs||0)*CS_SCALE + 0.03; }
  else if (faceRotY === -Math.PI/2) { cx2 = px + (pos.cs||0)*CS_SCALE - 0.03; }
  canvas.position.set(cx2, py, cz2);
  canvas.rotation.y = faceRotY;
  const textureLoader = new THREE.TextureLoader();
  textureLoader.load("assets/images/"+fileName, (tex)=>{
    canMat.map = tex;
    canMat.needsUpdate = true;
  }, undefined, (err)=>{console.error("Texture fail:", fileName, err);});
  const lh = 0.18, lw = Math.min(pw * 1.15, 1.8);
  const lc = document.createElement("canvas");
  lc.width = 1024; lc.height = 60;
  const lx = lc.getContext("2d");
  lx.clearRect(0,0,1024,60);
  lx.fillStyle = "rgba(0,0,0,0.5)";
  lx.fillRect(0,0,1024,60);
  lx.textAlign = "center"; lx.textBaseline = "middle";
  lx.fillStyle = "#ffffff";
  let fs = 26;
  lx.font = "bold "+fs+"px 'Microsoft YaHei',sans-serif";
  let tw = lx.measureText(dispName).width;
  while(tw > 1000 && fs > 12){ fs-=2; lx.font="bold "+fs+"px 'Microsoft YaHei',sans-serif"; tw=lx.measureText(dispName).width; }
  lx.fillText(dispName, 512, 32);
  const label = new THREE.Mesh(
    new THREE.PlaneGeometry(lw, lh),
    new THREE.MeshBasicMaterial({map: new THREE.CanvasTexture(lc), transparent: true, depthWrite: false, side: THREE.DoubleSide})
  );
  const ld = csDir(csOff);
  label.position.set(px+ld.dx, py - ph/2 - 0.12, pz+ld.dz);
  label.rotation.y = faceRotY;
  label.scale.x = getLabelScale(rotY, faceRotY);
  return {frame, canvas, label, canMat, pw, ph};
}

// ===================== MINIMAP =====================
function updateMinimap(){
  const cv=document.getElementById("mm");
  const displayW=190, displayH=220;
  const rs=3;
  cv.width=displayW*rs; cv.height=displayH*rs;
  const ctx=cv.getContext("2d");
  const w=cv.width, h=cv.height;
  ctx.clearRect(0,0,w,h);ctx.fillStyle="rgba(0,0,0,0.6)";ctx.fillRect(0,0,w,h);
  const mapW = 22, mapD = 44;
  const pad = 16*rs;
  const availW = w - pad*2, availH = h - pad*2;
  const scale = Math.min(availW/mapW, availH/mapD);
  const ox = (w - mapW*scale)/2, oy = (h - mapD*scale)/2;
  function mx(x){return ox + (x + 11)*scale;}
  function mz(z){return oy + (z + 21)*scale;}
  ctx.fillStyle="rgba(30,25,20,0.5)";ctx.fillRect(ox,oy,mapW*scale,mapD*scale);
  ctx.strokeStyle="#b0a090";
  ctx.lineWidth=2.5*rs;
  ctx.lineCap="round";
  const walls = [
    [[-11,-21],[11,-21]],
    [[-11,23],[11,23]],
    [[-11,-21],[-11,23]],
    [[11,-21],[11,23]],
    [[-5.2,-15],[-5.2,5]],
    [[5.2,-15],[5.2,5]],
    [[-5.2,17.5],[5.2,17.5]],
  ];
  for (const [[x1,z1],[x2,z2]] of walls) {
    ctx.beginPath(); ctx.moveTo(mx(x1), mz(z1));
    ctx.lineTo(mx(x2), mz(z2)); ctx.stroke();
  }
  ctx.fillStyle="#7a6a5a";
  const cols = [[-4,-10],[4,-10],[-4,2],[4,2],[-4,14],[4,14]];
  for (const [cx,cz] of cols) { ctx.beginPath(); ctx.arc(mx(cx), mz(cz), 2.5*rs, 0, Math.PI*2); ctx.fill(); }
  ctx.font="bold "+Math.round(13*rs)+"px sans-serif";
  ctx.textAlign="center"; ctx.textBaseline="middle";
  ctx.fillStyle="#ffd700";
  const labels = [
    {num:"①", x:-5.2+1.5, z:-3},{num:"②", x:5.2-1.5, z:-3},{num:"③", x:11+1.5, z:-5},{num:"④", x:-11-1.5, z:-5},
    {num:"⑤", x:0, z:24.5},{num:"⑥", x:0, z:-22.5},{num:"⑦", x:0, z:18.8},{num:"⑧", x:-5.2-1.5, z:-3},
    {num:"⑨", x:5.2+1.5, z:-3},{num:"⑩", x:0, z:16.2},
  ];
  for (const lb of labels) ctx.fillText(lb.num, mx(lb.x), mz(lb.z));
  // Paintings as red dots
  for (const obj of PAINTING_OBJECTS) {
    const p = obj.data;
    ctx.fillStyle = "#ff4444";
    ctx.beginPath(); ctx.arc(mx(p.x), mz(p.z), 2*rs, 0, Math.PI*2); ctx.fill();
  }
  // Models as cyan triangles
  for (const obj of MODEL_OBJECTS) {
    if (!obj || !obj.loaded) continue;
    const p = obj.data;
    const angle = p.rotY;
    const sx = mx(p.x), sy = mz(p.z);
    const sz = 3*rs;
    ctx.fillStyle = "#44ccff";
    ctx.beginPath();
    ctx.moveTo(sx + Math.cos(angle)*sz, sy + Math.sin(angle)*sz);
    ctx.lineTo(sx + Math.cos(angle+2.5)*sz, sy + Math.sin(angle+2.5)*sz);
    ctx.lineTo(sx + Math.cos(angle-2.5)*sz, sy + Math.sin(angle-2.5)*sz);
    ctx.closePath(); ctx.fill();
  }
  // User
  const cx=camera.position.x, cz=camera.position.z;
  ctx.beginPath(); ctx.arc(mx(cx), mz(cz), 3.5*rs, 0, Math.PI*2);
  ctx.fillStyle="#ffff44"; ctx.fill();
  ctx.strokeStyle="#fff"; ctx.lineWidth=1.5*rs; ctx.stroke();
  const dir=new THREE.Vector3(0,0,-1);
  dir.applyQuaternion(camera.quaternion);
  ctx.beginPath(); ctx.moveTo(mx(cx), mz(cz));
  ctx.lineTo(mx(cx+dir.x*1.8), mz(cz+dir.z*1.8));
  ctx.strokeStyle="#ffff44"; ctx.lineWidth=2.5*rs; ctx.stroke();
}

let wallLabels = [];

function showWallLabels() {
  hideWallLabels();
  const hasPaintings = new Array(ALL_WALLS.length).fill(false);
  for (const po of PAINTING_OBJECTS) {
    const wi = getWallIndex(po.data);
    if (wi >= 0) hasPaintings[wi] = true;
  }
  ALL_WALLS.forEach((w, idx) => {
    if (!hasPaintings[idx]) return;
    const num = idx + 1;
    const canvas = document.createElement("canvas");
    canvas.width = 256; canvas.height = 256;
    const ctx = canvas.getContext("2d");
    ctx.clearRect(0, 0, 256, 256);
    ctx.beginPath(); ctx.arc(128, 128, 100, 0, Math.PI * 2);
    ctx.fillStyle = "rgba(255, 215, 0, 0.85)"; ctx.fill();
    ctx.strokeStyle = "#fff"; ctx.lineWidth = 6; ctx.stroke();
    ctx.fillStyle = "#1a1a1a";
    ctx.font = "bold 80px sans-serif";
    ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.fillText(num.toString(), 128, 132);
    const texture = new THREE.CanvasTexture(canvas);
    const label = new THREE.Sprite(new THREE.SpriteMaterial({map: texture, transparent: true, depthWrite: false}));
    let lx = 0, ly = 2.5, lz = 0;
    if (w.xStart !== undefined) { lx = (w.xStart + w.xEnd) / 2; lz = w.z; }
    else { lx = w.x; lz = (w.zStart + w.zEnd) / 2; }
    const cs = w.cs || 0;
    if (w.xStart !== undefined) lz += cs * 0.8;
    else lx += cs * 0.8;
    if (idx === 0) { lx += 1.0; lz += 0.8; }
    if (idx === 7) { lx -= 1.0; lz -= 0.8; }
    if (idx === 1) { lx -= 1.0; lz += 0.8; }
    if (idx === 8) { lx += 1.0; lz -= 0.8; }
    if (idx === 6) { lx += 1.2; lz += 0.8; }
    if (idx === 9) { lx -= 1.2; lz -= 0.8; }
    label.position.set(lx, 2.5, lz);
    label.scale.set(0.8, 0.8, 1);
    scene.add(label);
    wallLabels.push(label);
  });
}

function hideWallLabels() {
  for (const l of wallLabels) { scene.remove(l); l.material.dispose(); }
  wallLabels = [];
}

function getPaintingIntersects(clientX, clientY) {
  const rect = renderer.domElement.getBoundingClientRect();
  pointer.x = ((clientX - rect.left) / rect.width) * 2 - 1;
  pointer.y = -((clientY - rect.top) / rect.height) * 2 + 1;
  raycaster.setFromCamera(pointer, camera);
  const meshes = [];
  for (let i = 0; i < PAINTING_OBJECTS.length; i++) {
    meshes.push(PAINTING_OBJECTS[i].frame);
    meshes.push(PAINTING_OBJECTS[i].canvas);
  }
  return raycaster.intersectObjects(meshes);
}

function getWallIndex(p) {
  let bestIdx = -1, bestDist = Infinity;
  for (let i = 0; i < ALL_WALLS.length; i++) {
    const w = ALL_WALLS[i];
    let cx, cz;
    if (w.xStart !== undefined) { cx = Math.max(w.xStart, Math.min(w.xEnd, p.x)); cz = w.z; }
    else { cx = w.x; cz = Math.max(w.zStart, Math.min(w.zEnd, p.z)); }
    const dist = Math.sqrt((p.x - cx)**2 + (p.z - cz)**2);
    if (dist < bestDist && dist < 0.6) { bestDist = dist; bestIdx = i; }
  }
  if (bestIdx >= 0) {
    const w = ALL_WALLS[bestIdx];
    if (Math.abs(w.rotY - p.rotY) > 0.05) {
      if (w.faceRotY !== undefined && p.faceRotY !== undefined) {
        if (Math.abs(w.faceRotY - p.faceRotY) > 0.05) bestIdx = -1;
      } else bestIdx = -1;
    }
  }
  return bestIdx;
}

function moveToWall(obj, wallIdx) {
  const w = ALL_WALLS[wallIdx];
  if (!w) return;
  const p = obj.data;
  p.rotY = w.rotY;
  p.cs = w.cs || 0;
  p.faceRotY = w.faceRotY !== undefined ? w.faceRotY : w.rotY + Math.PI;
  if (w.xStart !== undefined) { p.x = (w.xStart + w.xEnd) / 2; p.z = w.z; }
  else { p.z = (w.zStart + w.zEnd) / 2; p.x = w.x; }
  p.y = 2.2;
  updateSinglePainting(SELECTED_IDX);
  selectPainting(SELECTED_IDX);
  const dist = 3.0;
  const faceRY = p.faceRotY !== undefined ? p.faceRotY : p.rotY + Math.PI;
  let cx = p.x + Math.sin(faceRY) * dist;
  let cz = p.z + Math.cos(faceRY) * dist;
  cx = Math.max(-12, Math.min(12, cx));
  cz = Math.max(-20, Math.min(24, cz));
  camera.position.set(cx, Math.max(1.5, p.y), cz);
  camera.lookAt(p.x, p.y, p.z);
  euler.setFromQuaternion(camera.quaternion);
  updateMinimap();
}

function buildWallButtons() {

function updatePaintingMeshPositions(obj) {
  const p = obj.data;
  p.x = Math.max(-11.5, Math.min(11.5, p.x));
  p.z = Math.max(-21.5, Math.min(23.5, p.z));
  p.y = Math.max(0.8, Math.min(4.5, p.y));
  const {pw, ph} = computePaintingSize(p.fileName, p.scale);
  const faceRY = p.faceRotY !== undefined ? p.faceRotY : p.rotY + Math.PI;
  function csDir(val) { const r = p.rotY; if (r === 0 || r === Math.PI) return {dx:0, dz:val}; else return {dx:val, dz:0}; }
  const cs = (p.cs||0) * CS_SCALE;
  const fd = csDir(cs);
  obj.frame.position.set(p.x+fd.dx, p.y, p.z+fd.dz);
  obj.frame.rotation.y = p.rotY;
  const cd = csDir(cs);
  const extraDir = {dx:0, dz:0};
  if (faceRY === 0) extraDir.dz = 0.03;
  else if (faceRY === Math.PI) extraDir.dz = -0.03;
  else if (faceRY === Math.PI/2) extraDir.dx = 0.03;
  else if (faceRY === -Math.PI/2) extraDir.dx = -0.03;
  obj.canvas.rotation.y = faceRY;
  obj.canvas.position.set(p.x+cd.dx+extraDir.dx, p.y, p.z+cd.dz+extraDir.dz);
  const ld = csDir(cs);
  obj.label.rotation.y = faceRY;
  obj.label.position.set(p.x+ld.dx, p.y - ph/2 - 0.12, p.z+ld.dz);
  obj.label.scale.x = getLabelScale(p.rotY, p.faceRotY);
}

function updateSinglePainting(idx) {

  lx.textAlign = "center"; lx.textBaseline = "middle";
  lx.fillStyle = "#ffffff";
  let fs = 26;
  lx.font = "bold "+fs+"px 'Microsoft YaHei',sans-serif";
  let tw = lx.measureText(dispName).width;
  while(tw > 1000 && fs > 12){ fs-=2; lx.font="bold "+fs+"px 'Microsoft YaHei',sans-serif"; tw=lx.measureText(dispName).width; }
  lx.fillText(dispName, 512, 32);
  obj.label.geometry = new THREE.PlaneGeometry(lw, lh);
  obj.label.material = new THREE.MeshBasicMaterial({map: new THREE.CanvasTexture(lc), transparent: true, depthWrite: false, side: THREE.DoubleSide});
  obj.label.scale.x = getLabelScale(p.rotY, p.faceRotY);
  const faceRY = p.faceRotY !== undefined ? p.faceRotY : p.rotY + Math.PI;
  function csDir(val) { const r = p.rotY; if (r === 0 || r === Math.PI) return {dx:0, dz:val}; else return {dx:val, dz:0}; }
  const cs = (p.cs||0) * CS_SCALE;
  const fd = csDir(cs);
  obj.frame.position.set(p.x+fd.dx, p.y, p.z+fd.dz);
  obj.frame.rotation.y = p.rotY;
  const cd = csDir(cs);
  const extraDir = {dx:0, dz:0};
  if (faceRY === 0) extraDir.dz = 0.03;
  else if (faceRY === Math.PI) extraDir.dz = -0.03;
  else if (faceRY === Math.PI/2) extraDir.dx = 0.03;
  else if (faceRY === -Math.PI/2) extraDir.dx = -0.03;
  obj.canvas.rotation.y = faceRY;
  obj.canvas.position.set(p.x+cd.dx+extraDir.dx, p.y, p.z+cd.dz+extraDir.dz);
  const ld = csDir(cs);
  obj.label.rotation.y = faceRY;
  obj.label.position.set(p.x+ld.dx, p.y - ph/2 - 0.12, p.z+ld.dz);
  obj.pw = pw; obj.ph = ph;
}

// ===================== CS ARROW =====================
let csArrowGroup = null;

function createCSArrow() {
  if (csArrowGroup) { scene.remove(csArrowGroup); csArrowGroup = null; }
  csArrowGroup = new THREE.Group();
  const arrowLen = 0.25;
  const arrowMat = new THREE.MeshBasicMaterial({ color: 0xff4444 });
  const shaft = new THREE.Mesh(new THREE.CylinderGeometry(0.008, 0.008, arrowLen * 0.6, 8), arrowMat);
  shaft.rotation.z = -Math.PI / 2;
  shaft.position.x = arrowLen * CS_SCALE;
  csArrowGroup.add(shaft);
  const head = new THREE.Mesh(new THREE.ConeGeometry(0.03, arrowLen * 0.4, 8), arrowMat);
  head.rotation.z = -Math.PI / 2;
  head.position.x = arrowLen * 0.8;
  csArrowGroup.add(head);
  const glowMat = new THREE.SpriteMaterial({
    map: (()=>{const c=document.createElement("canvas");c.width=64;c.height=64;const ctx=c.getContext("2d");const g=ctx.createRadialGradient(32,32,0,32,32,32);g.addColorStop(0,"rgba(255,68,68,0.4)");g.addColorStop(1,"rgba(255,68,68,0)");ctx.fillStyle=g;ctx.fillRect(0,0,64,64);return new THREE.CanvasTexture(c);})(),
    transparent: true, depthWrite: false, blending: THREE.AdditiveBlending
  });
  const glow = new THREE.Sprite(glowMat);
  glow.position.x = arrowLen * 0.8;
  glow.scale.set(0.3, 0.3, 1);
  csArrowGroup.add(glow);
  scene.add(csArrowGroup);
}

function updateCSArrow(obj) {
  if (!csArrowGroup) createCSArrow();
  if (!csArrowGroup) return;
  const p = obj.data;
  const pw = obj.pw || 1.0;
  const ph = obj.ph || 1.0;
  const faceRY = p.faceRotY !== undefined ? p.faceRotY : p.rotY + Math.PI;
  const arrowOffsetX = pw / 2 + 0.25;
  let ax, ay, az, aRot;
  if (faceRY === 0) { ax = p.x + arrowOffsetX; ay = p.y + ph/2 + 0.1; az = p.z; aRot = 0; }
  else if (faceRY === Math.PI) { ax = p.x - arrowOffsetX; ay = p.y + ph/2 + 0.1; az = p.z; aRot = Math.PI; }
  else if (faceRY === Math.PI/2) { ax = p.x; ay = p.y + ph/2 + 0.1; az = p.z + arrowOffsetX; aRot = Math.PI/2; }
  else { ax = p.x; ay = p.y + ph/2 + 0.1; az = p.z - arrowOffsetX; aRot = -Math.PI/2; }
  csArrowGroup.position.set(ax, ay, az);
  csArrowGroup.rotation.y = aRot;
  csArrowGroup.visible = true;
}

function hideCSArrow() { if (csArrowGroup) csArrowGroup.visible = false; }

// ===================== PAINTING MOVE =====================
function movePainting(e, obj, p, mv) {
  e.preventDefault();
  switch (e.code) {
    case "KeyA":
      if (p.rotY === 0 || p.rotY === Math.PI) p.x -= Math.cos(p.rotY) * mv;
      else p.z += Math.sin(p.rotY) * mv;
      break;
    case "KeyD":
      if (p.rotY === 0 || p.rotY === Math.PI) p.x += Math.cos(p.rotY) * mv;
      else p.z -= Math.sin(p.rotY) * mv;
      break;
    case "KeyW": p.y += mv; break;
    case "KeyS": p.y -= mv; break;
    case "KeyE":
      p.cs = -(p.cs || 0);
      if (p.faceRotY !== undefined) p.faceRotY = (p.faceRotY + Math.PI) % (Math.PI * 2);
      break;
    case "KeyQ":
      const curWall = getWallIndex(p);
      if (curWall >= 0) { moveToWall(obj, (curWall + 1) % ALL_WALLS.length); return; }
      break;
  }
  updateSinglePainting(SELECTED_IDX);
  selectPainting(SELECTED_IDX);
  updateMinimap();
  if (SELECTED_IDX >= 0) updateCSArrow(PAINTING_OBJECTS[SELECTED_IDX]);
}

async function savePaintingLayout() {
  const layout = PAINTING_OBJECTS.map(o => ({
    fileName: o.data.fileName,
    x: Math.round(o.data.x * 100) / 100,
    y: Math.round(o.data.y * 100) / 100,
    z: Math.round(o.data.z * 100) / 100,
    rotY: o.data.rotY,
    scale: o.data.scale,
    cs: o.data.cs,
    faceRotY: o.data.faceRotY
  }));
  try {
    const resp = await fetch("api/paintings-layout", { method: "POST", headers: {"Content-Type": "application/json"}, body: JSON.stringify(layout) });
    const result = await resp.json();
    const st = document.getElementById("save-status");
    if (result.ok) { st.textContent = "✓ Saved!"; st.style.display = "inline"; setTimeout(() => { st.style.display = "none"; }, 2000); }
    else { st.textContent = "✗ Save failed"; st.style.display = "inline"; setTimeout(() => { st.style.display = "none"; }, 3000); }
    return result.ok;
  } catch (e) { console.error("Save failed", e); return false; }
}

async function saveModelLayout() {
  const layout = [];
  for (let i = 0; i < MODEL_OBJECTS.length; i++) {
    const obj = MODEL_OBJECTS[i];
    if (!obj) continue;
    const p = obj.data;
    layout.push({ fileName: MODELS[i], x: Math.round(p.x*100)/100, y: Math.round((p.y||0)*100)/100, z: Math.round(p.z*100)/100, rotY: Math.round(p.rotY*100)/100, scale: Math.round(p.scale*100)/100 });
  }
  try {
    const resp = await fetch("api/models-layout", { method: "POST", headers: {"Content-Type": "application/json"}, body: JSON.stringify(layout) });
    const result = await resp.json();
    const st = document.getElementById("save-status");
    if (result.ok) { st.textContent = "✓ Saved!"; st.style.display = "inline"; setTimeout(() => { st.style.display = "none"; }, 2000); }
    else { st.textContent = "✗ Save failed"; st.style.display = "inline"; setTimeout(() => { st.style.display = "none"; }, 3000); }

  } catch (e) { console.error("Save model layout failed", e); return false; }
}

      if (hits.length > 0) {
        for (let i = 0; i < MODEL_OBJECTS.length; i++) {
          if (!MODEL_OBJECTS[i]) continue;
          let found = false;
          MODEL_OBJECTS[i].group.traverse((child) => {
            if (child === hits[0].object) found = true;
          });
          if (found) { selectModel(i); break; }
        }
      } else selectModel(-1);
    }
    return;
  }
  if(!pointerLocked&&!orbiting)renderer.domElement.requestPointerLock();
});

document.addEventListener("pointerlockchange",()=>{
  pointerLocked=document.pointerLockElement===renderer.domElement;
  if(pointerLocked){
    euler.setFromQuaternion(camera.quaternion);
    const ui=document.getElementById("ui");ui.style.opacity="0";setTimeout(()=>{ui.style.display="none"},500);
  }else{
    mvF=0;mvB=0;mvL=0;mvR=0;
    isDragging=false; isResizing=false;
    euler.setFromQuaternion(camera.quaternion);
    if (!EDIT_MODE) {
      orbiting=false;selModel=null;document.getElementById("popup").style.display="none";
      const ui=document.getElementById("ui");ui.style.display="block";ui.style.opacity="1";
    }
  }
});

document.addEventListener("mousemove",(e)=>{
  if (EDIT_MODE) {
    if (EDIT_SUB_MODE === "paintings") {
      const hits = getPaintingIntersects(e.clientX, e.clientY);
      renderer.domElement.style.cursor = hits.length > 0 ? "pointer" : "default";
    } else {
      const hits = getModelIntersects(e.clientX, e.clientY);
      renderer.domElement.style.cursor = hits.length > 0 ? "pointer" : "default";
    }
    return;
  }
  if(!pointerLocked) return;
  if(orbiting&&dragging){oAngle+=e.movementX*0.005;return;}
  euler.setFromQuaternion(camera.quaternion);
  euler.y-=e.movementX*0.004;euler.x-=e.movementY*0.003;
  euler.x=Math.max(-PI_2,Math.min(PI_2,euler.x));
  camera.quaternion.setFromEuler(euler);
});

renderer.domElement.addEventListener("mousedown",(e)=>{ if (EDIT_MODE) return; if(selModel!==null&&e.button===0){dragging=true;pm={x:0,y:0};} });
renderer.domElement.addEventListener("mouseup",(e)=>{ if (!EDIT_MODE) dragging=false; });

renderer.domElement.addEventListener("wheel",(e)=>{
  if (EDIT_MODE) {
    if (EDIT_SUB_MODE === "paintings" && SELECTED_IDX >= 0 && !isDragging) {
      e.preventDefault();
      const obj = PAINTING_OBJECTS[SELECTED_IDX];
      let newScale = Math.round((obj.data.scale + (e.deltaY > 0 ? -0.05 : 0.05)) * 100) / 100;
      obj.data.scale = newScale;
      updateSinglePainting(SELECTED_IDX);
      selectPainting(SELECTED_IDX);
      return;
    }
    if (EDIT_SUB_MODE === "models" && SELECTED_MODEL_IDX >= 0 && !isDragging) {
      e.preventDefault();
      const obj = MODEL_OBJECTS[SELECTED_MODEL_IDX];
      if (!obj) { return; }
      obj.data.scale = Math.max(0.3, Math.min(5.0, obj.data.scale + (e.deltaY > 0 ? -0.05 : 0.05)));
      // Rebuild model with new scale
      const idx = SELECTED_MODEL_IDX;
      scene.remove(obj.group);
      scene.remove(obj.ring);
      delete MODEL_OBJECTS[idx];
      loaded[idx] = false;
      MODEL_LAYOUT[idx] = obj.data;
      loadModelFromLayout(idx);
      selectModel(-1);
      return;
    }
  }
  if(orbiting){oRad+=e.deltaY*0.01;oRad=Math.max(1.5,Math.min(8,oRad));}
},{passive:false});

window.addEventListener("resize",()=>{camera.aspect=window.innerWidth/window.innerHeight;camera.updateProjectionMatrix();renderer.setSize(window.innerWidth,window.innerHeight);});
document.getElementById("pcls").addEventListener("click",()=>{document.getElementById("popup").style.display="none";});
document.getElementById("minimap").addEventListener("click",()=>{ document.getElementById("minimap").classList.toggle("fullscreen"); });

// ===================== ORBIT =====================
function enterOrbit(idx){
  if(orbiting&&selModel===idx){exitOrbit();return;}
  selModel=idx;orbiting=true;oAngle=0;oRad=3;oY=0.5;
  document.getElementById("ptitle").textContent=MODEL_NAME_MAP[MODELS[idx]] || "展品 #"+(idx+1);
  document.getElementById("pbody").textContent="模型: "+MODELS[idx].substring(0,16)+"  拖动旋转  滚轮缩放  按E退出浏览";
  document.getElementById("popup").style.display="block";
}
function exitOrbit(){orbiting=false;selModel=null;document.getElementById("popup").style.display="none";}
function updateOrbit(dt){
  if(!orbiting||selModel===null)return;
  const obj=MODEL_OBJECTS[selModel];
  if(!obj) return;
  const cx=obj.data.x, cz=obj.data.z, cy=obj.data.y||0;
  const tx=cx+Math.cos(oAngle)*oRad,tz=cz+Math.sin(oAngle)*oRad,ty=cy+0.5+oY;
  camera.position.lerp(new THREE.Vector3(tx,ty,tz),5*dt);camera.lookAt(cx,cy+0.5,cz);
}

// ===================== UPDATE / ANIMATE =====================
function findNearestModel(){
  const cp=camera.position.clone();let n=null,d=4.0;
  for(let i=0;i<MODEL_OBJECTS.length;i++){
    const obj=MODEL_OBJECTS[i];
    if(!obj||!obj.loaded) continue;
    const dx=cp.x-obj.data.x, dz=cp.z-obj.data.z;
    const dist=Math.sqrt(dx*dx+dz*dz);if(dist<d){d=dist;n=i;}
  }
  return n;
}
function updateInfo(){
  const nearest=findNearestModel();
  if(nearest!==null){
    const obj=MODEL_OBJECTS[nearest];
    document.getElementById("hall").textContent="展区";
    document.getElementById("exh").textContent=MODEL_NAME_MAP[MODELS[nearest]] || "展品 #"+(nearest+1);
    document.getElementById("hint").textContent=obj.loaded?"滚轮缩放  拖动旋转  按E浏览":"加载中...";
    itgt=nearest;
  }else{document.getElementById("hall").textContent="走廊";document.getElementById("exh").textContent="";document.getElementById("hint").textContent="四处走走探索";itgt=null;}
}

// Always render minimap in free roam mode
function updateFP(dt){
  if(orbiting||!pointerLocked)return;const spd=8*dt;vel.set(0,0,0);
  if(mvF)vel.z-=spd;if(mvB)vel.z+=spd;if(mvL)vel.x-=spd;if(mvR)vel.x+=spd;
  if(vel.length()>0){vel.normalize().multiplyScalar(spd);
    const fwd=new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion);fwd.y=0;fwd.normalize();
    const rgt=new THREE.Vector3(1,0,0).applyQuaternion(camera.quaternion);rgt.y=0;rgt.normalize();
    const desX = camera.position.x + (-vel.z * fwd.x + vel.x * rgt.x);
    const desZ = camera.position.z + (-vel.z * fwd.z + vel.x * rgt.z);
    const clamped = clampMovement(desX, desZ, CAMERA_COL_RADIUS);
    camera.position.x = clamped.x;
    camera.position.z = clamped.z;
    const now=performance.now();if(now-lastStep>400){snd(60,0.06,0.02);lastStep=now;}}
}
function animate(){
  requestAnimationFrame(animate);const dt=Math.min(clk.getDelta(),0.1);
  if(pointerLocked && !EDIT_MODE){updateFP(dt);updateInfo();updateMinimap();}
  updateOrbit(dt);
  // Animate unloaded model rings (flash) — but we no longer have pedestal rings
  renderer.render(scene,camera);
}

// ===================== BOOT =====================
async function fetchModelList() {
  try {
    const resp = await fetch("api/models");
    const data = await resp.json();
    MODELS = data.models;
    document.getElementById("subtitle").textContent = MODELS.length + " 3D Exhibits";
  } catch (e) {
    console.error("Failed to fetch model list", e);
    MODELS = [];
    document.getElementById("subtitle").textContent = "未找到模型";
  }
}
async function fetchPaintingList() {
  try {
    const resp = await fetch("api/paintings");
    const data = await resp.json();
    PAINTINGS = data.paintings;
  } catch (e) {
    console.error("Failed to fetch painting list", e);
    PAINTINGS = [];
  }
}
async function fetchNameMap() {
  try { const resp = await fetch("api/name-map"); NAME_MAP = await resp.json(); } catch(e){}
}
async function fetchPaintingSizes() {
  try { const resp = await fetch("api/painting-sizes"); PAINTING_SIZES = await resp.json(); } catch(e){}
}
async function fetchPaintingLayout() {
  try { const resp = await fetch("api/paintings-layout"); const data = await resp.json(); PAINTING_LAYOUT = data.layout; } catch(e){ PAINTING_LAYOUT = null; }
}

async function startMuseum() {
  await Promise.all([fetchModelList(), fetchPaintingList(), fetchNameMap(), fetchPaintingSizes(), fetchPaintingLayout(), fetchModelLayout(), fetchModelNameMap()]);
  buildMuseum();
  setupLights();

  if (MODELS.length > 0) {
    // Ensure MODEL_LAYOUT is valid
    if (!MODEL_LAYOUT || MODEL_LAYOUT.length === 0) {
      MODEL_LAYOUT = buildDefaultModelLayout(MODELS.length);
    }
    for (let i = 0; i < Math.min(MODEL_LAYOUT.length, MODELS.length); i++) {
      MODEL_LAYOUT[i].fileName = MODELS[i];
    }
    loadAllModelsFromLayout();
  }
  loadAllPaintings();

  document.getElementById("subtitle").textContent = (MODELS.length ? MODELS.length+" 件3D展品 | " : "") + PAINTINGS.length + " 幅画作";
  document.getElementById("hint").textContent="按 [ / ] 调节视角高低";
  console.log("云上艺术馆加载完成 -",MODELS.length,"件展品,",PAINTINGS.length,"幅画作");
}

startMuseum();
animate();
</script>
